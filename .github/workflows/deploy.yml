name: Deploy to ECS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 084928383265.dkr.ecr.ap-south-1.amazonaws.com

      # ✅ Build with unique tag
      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

      # ✅ Tag for ECR
      - name: Tag image
        run: docker tag my-app:${{ github.sha }} 084928383265.dkr.ecr.ap-south-1.amazonaws.com/my-app:${{ github.sha }}

      # ✅ Push to ECR
      - name: Push image
        run: docker push 084928383265.dkr.ecr.ap-south-1.amazonaws.com/my-app:${{ github.sha }}

      # ✅ Update task definition with new image
      - name: Update ECS Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition app \
            --query taskDefinition > task-def.json

          cat task-def.json | jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          ) | .containerDefinitions[0].image="084928383265.dkr.ecr.ap-south-1.amazonaws.com/my-app:${{ github.sha }}"' > new-task-def.json

          aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json

      # ✅ Deploy new task
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster my-cluster \
            --service app-service-lc2cue16 \
            --force-new-deployment \
            --region ap-south-1